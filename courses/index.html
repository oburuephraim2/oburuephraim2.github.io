<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Remote Training & Certification</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #1976d2; --accent: #ffa000; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Study Material Styles */
        .study-section { background: #fff8e1; border-left: 6px solid var(--accent); padding: 20px; margin-bottom: 30px; border-radius: 8px; }
        .topic-card { margin-bottom: 15px; }
        .topic-title { font-weight: bold; color: #856404; display: block; }

        /* Exam Styles */
        .question-card { border-left: 6px solid var(--secondary); background: #f9f9f9; padding: 25px; margin-bottom: 20px; border-radius: 8px; }
        .option { display: block; background: white; border: 1px solid #ddd; margin: 8px 0; padding: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #e3f2fd; }
        .option input { margin-right: 12px; transform: scale(1.2); }

        /* Feedback Styles */
        .feedback-text { margin-top: 10px; font-size: 0.9rem; font-style: italic; color: #555; display: none; }
        .correct-ans { color: var(--primary); font-weight: bold; }

        /* Buttons & Results */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1b5e20; }
        
        #results { display: none; text-align: center; margin-top: 30px; }
        .score-box { font-size: 50px; font-weight: bold; color: var(--secondary); margin: 10px 0; }
        .pass-msg { color: var(--primary); background: #e8f5e9; padding: 20px; border-radius: 8px; }
        .fail-msg { color: #d32f2f; background: #ffebee; padding: 20px; border-radius: 8px; }

        /* ADMIN PANEL */
        #admin-panel {
            display: none;
            background: #fff3e0;
            border: 3px solid #ff9800;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(255,152,0,0.3);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .admin-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header id="course-header" style="position:relative;">
        <h1 id="main-title">Loading Training...</h1>
        <p id="course-ver"></p>
        <button onclick="enterAdminMode()" class="admin-btn" style="position:absolute; top:10px; right:10px;">🔧 ADMIN</button>
    </header>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <div class="admin-header">
            <h3>🔧 ADMIN CONTROL PANEL</h3>
            <button onclick="closeAdminPanel()" style="background:#666;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">Close</button>
        </div>
        <p><strong>Password verified.</strong> Browse for any course JSON file (must match the required structure):</p>
        <input type="file" id="course-json-input" accept=".json" style="width:100%; padding:10px; margin:10px 0; border:2px dashed #ff9800; border-radius:8px;" onchange="loadCourse(this)">
        <div style="margin-top:15px;">
            <button onclick="resetToDefault()" class="btn" style="background:#666;color:white;width:auto;padding:10px 25px;">Reset to Default Course</button>
        </div>
        <small style="color:#666; display:block; margin-top:10px;">Tip: Files are saved locally in your browser. Refresh keeps the loaded course.</small>
    </div>

    <div id="study-phase" class="study-section">
        <h3>📖 Study Material</h3>
        <div id="material-content"></div>
        <button class="btn btn-primary" onclick="startExam()" style="margin-top:20px;">I'm Ready: Start Exam</button>
    </div>

    <div id="exam-phase" style="display:none;">
        <div id="questions-container"></div>
        <button class="btn btn-primary" onclick="gradeExam()">Submit Exam for Certification</button>
    </div>

    <div id="results">
        <h2>Exam Analysis</h2>
        <div class="score-box" id="final-score">0%</div>
        <div id="result-banner"></div>
        <div id="review-area" style="text-align:left; margin-top:20px;"></div>
    </div>
</div>

<script>
// ====================== DEFAULT COURSE DATA (used if no JSON loaded) ======================
const defaultCourseData = {
  "courseMetadata": {
    "title": "Computer Hardware & Security Essentials",
    "version": "v1.2 (Remote Training)",
    "passingScore": 80
  },
  "studyMaterial": [
    {
      "topic": "Input/Output Devices",
      "content": "Input devices (Keyboard, Mouse) send data to the PC. Output devices (Monitor, Printer, Speakers) receive data."
    },
    {
      "topic": "Password Security",
      "content": "A strong password must have at least 12 characters and include a mix of symbols, numbers, and cases."
    }
  ],
  "questions": [
    {
      "id": 1,
      "type": "multiple",
      "text": "Identify all 'Output' devices from the list below:",
      "options": ["Monitor", "Keyboard", "Laser Printer", "Webcam", "Speakers"],
      "correct": [0, 2, 4],
      "points": 2,
      "feedback": "Correct! Monitors, Printers, and Speakers are output devices."
    },
    {
      "id": 2,
      "type": "single",
      "text": "What is the minimum recommended length for a secure password?",
      "options": ["6 characters", "8 characters", "12 characters", "16 characters"],
      "correct": [2],
      "points": 1,
      "feedback": "12 characters is the modern cybersecurity standard."
    }
  ]
};

// ====================== GLOBAL STATE ======================
let courseData = JSON.parse(JSON.stringify(defaultCourseData)); // deep copy

// ====================== CORE ENGINE ======================
function initSystem() {
    // 1. Set Header
    document.getElementById('main-title').innerText = courseData.courseMetadata.title;
    document.getElementById('course-ver').innerText = courseData.courseMetadata.version;

    // 2. Load Study Material
    const studyContainer = document.getElementById('material-content');
    studyContainer.innerHTML = '';
    courseData.studyMaterial.forEach(item => {
        studyContainer.innerHTML += `
            <div class="topic-card">
                <span class="topic-title">${item.topic}</span>
                <span>${item.content}</span>
            </div>
        `;
    });

    // 3. Prepare Questions
    const qContainer = document.getElementById('questions-container');
    qContainer.innerHTML = '';
    courseData.questions.forEach((q, qIdx) => {
        const inputType = q.type === 'multiple' ? 'checkbox' : 'radio';
        let optionsHTML = q.options.map((opt, oIdx) => `
            <label class="option">
                <input type="\( {inputType}" name="q \){qIdx}" value="${oIdx}"> ${opt}
            </label>
        `).join('');

        qContainer.innerHTML += `
            <div class="question-card" id="card-${qIdx}">
                <div style="font-weight:bold; margin-bottom:10px;">${qIdx + 1}. ${q.text}</div>
                ${optionsHTML}
                <div class="feedback-text" id="feed-${qIdx}"><strong>Note:</strong> ${q.feedback}</div>
            </div>
        `;
    });
}

function startExam() {
    document.getElementById('study-phase').style.display = 'none';
    document.getElementById('exam-phase').style.display = 'block';
    window.scrollTo(0, 0);
}

function gradeExam() {
    let totalEarned = 0;
    let maxPossible = 0;

    courseData.questions.forEach((q, qIdx) => {
        maxPossible += q.points;
        const selected = Array.from(document.querySelectorAll(`input[name="q${qIdx}"]:checked`))
                              .map(el => parseInt(el.value));

        let qScore = 0;
        if (q.type === 'single') {
            if (selected.length > 0 && selected[0] === q.correct[0]) qScore = q.points;
        } else {
            // Partial Credit (no negative below zero)
            const weight = q.points / q.correct.length;
            let correctCount = 0;
            selected.forEach(val => {
                if (q.correct.includes(val)) correctCount++;
            });
            qScore = correctCount * weight;
        }
        totalEarned += Math.max(0, qScore);
        
        // Reveal feedback
        const feed = document.getElementById(`feed-${qIdx}`);
        if (feed) feed.style.display = 'block';
    });

    const finalPercent = Math.min(100, Math.max(0, (totalEarned / maxPossible) * 100));
    showResults(finalPercent);
}

function showResults(score) {
    document.getElementById('exam-phase').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('final-score').innerText = score.toFixed(1) + "%";

    const banner = document.getElementById('result-banner');
    if (score >= courseData.courseMetadata.passingScore) {
        banner.innerHTML = `
            <div class="pass-msg">
                <h3>CONGRATULATIONS!</h3>
                <p>You have passed the certification requirements.</p>
                <button class="btn btn-primary" onclick="generateCert(${score.toFixed(1)})" style="width:auto; padding:10px 30px;">Download Certificate</button>
            </div>`;
    } else {
        banner.innerHTML = `
            <div class="fail-msg">
                <h3>NOT YET CERTIFIED</h3>
                <p>You need ${courseData.courseMetadata.passingScore}% to pass. Review your mistakes below and retry.</p>
                <button class="btn" style="background:#666; color:white; width:auto; padding:10px 30px;" onclick="location.reload()">Retry Training</button>
            </div>`;
    }
}

// ====================== CERTIFICATE ======================
function generateCert(score) {
    const name = prompt("Please enter your full name for the certificate:");
    if (!name) return;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1600; canvas.height = 1131;

    ctx.fillStyle = "white"; ctx.fillRect(0,0,1600,1131);
    ctx.strokeStyle = "#1976d2"; ctx.lineWidth = 40; ctx.strokeRect(20,20,1560,1091);
    
    ctx.textAlign = "center"; ctx.fillStyle = "#333";
    ctx.font = "bold 80px Arial"; ctx.fillText("CERTIFICATE OF COMPLETION", 800, 300);
    ctx.font = "italic 40px Arial"; ctx.fillText("This is to certify that", 800, 420);
    ctx.font = "bold 90px Arial"; ctx.fillStyle = "#2e7d32"; ctx.fillText(name.toUpperCase(), 800, 550);
    ctx.fillStyle = "#333"; ctx.font = "40px Arial"; ctx.fillText(`Successfully completed: ${courseData.courseMetadata.title}`, 800, 680);
    ctx.font = "30px Arial"; ctx.fillText(`Final Grade: ${score}% | Date: ${new Date().toLocaleDateString()}`, 800, 800);
    
    const link = document.createElement('a');
    link.download = `Cert_${name.replace(/[^a-zA-Z0-9]/g,'_')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
}

// ====================== ADMIN & LOCAL FILE LOADING ======================
function enterAdminMode() {
    const entered = prompt("🔑 Enter Admin Password:");
    if (entered === "E@ss1234") {
        document.getElementById('admin-panel').style.display = 'block';
        // Optional: auto-scroll to panel
        document.getElementById('admin-panel').scrollIntoView({ behavior: 'smooth' });
    } else {
        alert("❌ Incorrect password.");
    }
}

function closeAdminPanel() {
    document.getElementById('admin-panel').style.display = 'none';
}

function loadCourse(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const loadedData = JSON.parse(e.target.result);
            
            // Basic validation (must have required keys)
            if (!loadedData.courseMetadata || !loadedData.studyMaterial || !loadedData.questions) {
                throw new Error("Missing required sections");
            }
            
            courseData = loadedData;
            localStorage.setItem('loadedCourseData', JSON.stringify(courseData));
            
            initSystem();
            alert(`✅ Course "${courseData.courseMetadata.title}" loaded successfully!\nVersion: ${courseData.courseMetadata.version}`);
            closeAdminPanel();
        } catch (err) {
            alert("❌ Invalid JSON file.\n\nMake sure the file matches the exact structure (courseMetadata, studyMaterial, questions).");
            console.error(err);
        }
    };
    reader.readAsText(file);
}

function resetToDefault() {
    if (confirm("Reset to the built-in default course?")) {
        courseData = JSON.parse(JSON.stringify(defaultCourseData));
        localStorage.removeItem('loadedCourseData');
        initSystem();
        alert("✅ Reset to default course.");
        closeAdminPanel();
    }
}

// ====================== PERSISTENCE (localStorage) ======================
function loadSavedCourse() {
    const saved = localStorage.getItem('loadedCourseData');
    if (saved) {
        try {
            courseData = JSON.parse(saved);
            console.log("Loaded saved course from browser storage");
        } catch (e) {
            console.warn("Saved course corrupted – using default");
            courseData = JSON.parse(JSON.stringify(defaultCourseData));
        }
    }
}

// ====================== STARTUP ======================
window.onload = function() {
    loadSavedCourse();   // Restore any previously loaded JSON
    initSystem();
};
</script>
</body>
</html>
