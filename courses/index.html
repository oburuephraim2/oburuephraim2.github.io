<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Remote Training & Certification</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #1976d2; --accent: #ffa000; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .study-section { background: #fff8e1; border-left: 6px solid var(--accent); padding: 20px; margin-bottom: 30px; border-radius: 8px; }
        .topic-card { margin-bottom: 15px; }
        .topic-title { font-weight: bold; color: #856404; display: block; }

        .question-card { border-left: 6px solid var(--secondary); background: #f9f9f9; padding: 25px; margin-bottom: 20px; border-radius: 8px; }
        .option { display: block; background: white; border: 1px solid #ddd; margin: 8px 0; padding: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #e3f2fd; }
        .option input { margin-right: 12px; transform: scale(1.2); }

        .feedback-text { margin-top: 10px; font-size: 0.9rem; font-style: italic; color: #555; display: none; border-top: 1px solid #ddd; padding-top: 10px; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1b5e20; }
        
        #results { display: none; text-align: center; margin-top: 30px; }
        .score-box { font-size: 50px; font-weight: bold; color: var(--secondary); margin: 10px 0; }
        .pass-msg { color: var(--primary); background: #e8f5e9; padding: 20px; border-radius: 8px; }
        .fail-msg { color: #d32f2f; background: #ffebee; padding: 20px; border-radius: 8px; }

        #admin-panel { display: none; background: #fff3e0; border: 3px solid #ff9800; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .admin-btn { background: #ff9800; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header id="course-header" style="position:relative;">
        <h1 id="main-title">Loading Training...</h1>
        <p id="course-ver"></p>
        <button onclick="enterAdminMode()" class="admin-btn" style="position:absolute; top:10px; right:10px;">🔧 ADMIN</button>
    </header>

    <div id="admin-panel">
        <div class="admin-header">
            <h3>🔧 ADMIN CONTROL PANEL</h3>
            <button onclick="closeAdminPanel()" style="background:#666;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">Close</button>
        </div>
        <p>Upload a course JSON file:</p>
        <input type="file" id="course-json-input" accept=".json" onchange="loadCourse(this)" style="margin-bottom: 10px;">
        <button onclick="resetToDefault()" class="btn" style="background:#666;color:white;width:auto;padding:10px 25px; font-size: 14px;">Reset to Default</button>
    </div>

    <div id="study-phase" class="study-section">
        <h3>📖 Study Material</h3>
        <div id="material-content"></div>
        <button class="btn btn-primary" onclick="startExam()" style="margin-top:20px;">Start Exam</button>
    </div>

    <div id="exam-phase" style="display:none;">
        <div id="questions-container"></div>
        <button class="btn btn-primary" onclick="gradeExam()">Submit Exam</button>
    </div>

    <div id="results">
        <h2>Exam Analysis</h2>
        <div class="score-box" id="final-score">0%</div>
        <div id="result-banner"></div>
    </div>
</div>

<script>
const defaultCourseData = {
  "courseMetadata": { "title": "Computer Hardware & Security", "version": "v1.2", "passingScore": 80 },
  "studyMaterial": [
    { "topic": "Hardware", "content": "Monitors are output; Keyboards are input." },
    { "topic": "Security", "content": "Use 12+ characters for passwords." }
  ],
  "questions": [
    { "id": 1, "type": "multiple", "text": "Select Output Devices:", "options": ["Monitor", "Mouse", "Printer"], "correct": [0, 2], "points": 2, "feedback": "Monitor and Printer receive data." },
    { "id": 2, "type": "single", "text": "Minimum password length?", "options": ["8", "12", "16"], "correct": [1], "points": 1, "feedback": "12 is the standard." }
  ]
};

let courseData = JSON.parse(JSON.stringify(defaultCourseData));

function initSystem() {
    document.getElementById('main-title').innerText = courseData.courseMetadata.title;
    document.getElementById('course-ver').innerText = courseData.courseMetadata.version;

    const studyContainer = document.getElementById('material-content');
    studyContainer.innerHTML = courseData.studyMaterial.map(item => `
        <div class="topic-card"><span class="topic-title">${item.topic}</span><span>${item.content}</span></div>
    `).join('');

    const qContainer = document.getElementById('questions-container');
    qContainer.innerHTML = '';
    courseData.questions.forEach((q, qIdx) => {
        const inputType = q.type === 'multiple' ? 'checkbox' : 'radio';
        let optionsHTML = q.options.map((opt, oIdx) => `
            <label class="option">
                <input type="${inputType}" name="q${qIdx}" value="${oIdx}"> ${opt}
            </label>
        `).join('');

        qContainer.innerHTML += `
            <div class="question-card">
                <div style="font-weight:bold; margin-bottom:10px;">${qIdx + 1}. ${q.text}</div>
                ${optionsHTML}
                <div class="feedback-text" id="feed-${qIdx}"><strong>Note:</strong> ${q.feedback}</div>
            </div>
        `;
    });
}

function startExam() {
    document.getElementById('study-phase').style.display = 'none';
    document.getElementById('exam-phase').style.display = 'block';
    window.scrollTo(0, 0);
}

function gradeExam() {
    let totalEarned = 0, maxPossible = 0;

    courseData.questions.forEach((q, qIdx) => {
        maxPossible += q.points;
        const selected = Array.from(document.querySelectorAll(`input[name="q${qIdx}"]:checked`)).map(el => parseInt(el.value));
        let qScore = 0;

        if (q.type === 'single') {
            if (selected[0] === q.correct[0]) qScore = q.points;
        } else {
            const weight = q.points / q.correct.length;
            selected.forEach(val => {
                qScore += q.correct.includes(val) ? weight : -weight;
            });
        }
        totalEarned += Math.max(0, qScore);
        document.getElementById(`feed-${qIdx}`).style.display = 'block';
    });

    showResults((totalEarned / maxPossible) * 100);
}

function showResults(score) {
    document.getElementById('exam-phase').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('final-score').innerText = score.toFixed(1) + "%";
    const banner = document.getElementById('result-banner');
    const passed = score >= courseData.courseMetadata.passingScore;
    
    banner.innerHTML = passed ? 
        `<div class="pass-msg"><h3>PASSED!</h3><button class="btn btn-primary" onclick="generateCert(${score.toFixed(1)})">Download Certificate</button></div>` : 
        `<div class="fail-msg"><h3>FAILED</h3><button class="btn" onclick="location.reload()">Try Again</button></div>`;
}

function generateCert(score) {
    const name = prompt("Enter full name:");
    if (!name) return;
    const canvas = document.createElement('canvas');
    canvas.width = 1600; canvas.height = 1131;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "white"; ctx.fillRect(0,0,1600,1131);
    ctx.strokeStyle = "#1976d2"; ctx.lineWidth = 40; ctx.strokeRect(20,20,1560,1091);
    ctx.textAlign = "center"; ctx.fillStyle = "#333";
    ctx.font = "bold 80px Arial"; ctx.fillText("CERTIFICATE OF COMPLETION", 800, 300);
    ctx.font = "90px Arial"; ctx.fillText(name.toUpperCase(), 800, 550);
    const link = document.createElement('a');
    link.download = `Cert_${name}.png`; link.href = canvas.toDataURL(); link.click();
}

function enterAdminMode() {
    if (prompt("Admin Password:") === "E@ss1234") document.getElementById('admin-panel').style.display = 'block';
}

function closeAdminPanel() { document.getElementById('admin-panel').style.display = 'none'; }

function loadCourse(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        courseData = JSON.parse(e.target.result);
        localStorage.setItem('loadedCourseData', JSON.stringify(courseData));
        initSystem();
        closeAdminPanel();
    };
    reader.readAsText(input.files[0]);
}

function resetToDefault() {
    localStorage.removeItem('loadedCourseData');
    location.reload();
}

window.onload = () => {
    const saved = localStorage.getItem('loadedCourseData');
    if (saved) courseData = JSON.parse(saved);
    initSystem();
};
</script>
</body>
</html>
